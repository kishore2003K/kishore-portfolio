<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kishore R – Full-Stack Developer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;
  --bg2:rgba(20,20,20,0.6);
  --bg3:rgba(30,30,30,0.6);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.15);
  --text:#f0f0f0;--muted:#999;--dim:#666;
  --accent:#4f8ef7;--accent2:#7c6bf5;
  --green:#3dd68c;--amber:#f0a429;
  --radius:16px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* Animated Background */
.bg-blobs { position: fixed; inset: 0; z-index: -1; overflow: hidden; background: var(--bg); pointer-events: none; }
.bg-blob { position: absolute; filter: blur(120px); opacity: 0.35; animation: float 20s infinite ease-in-out; border-radius: 50%; }
.blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(79, 142, 247, 0.2); animation-delay: 0s; }
.blob-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: rgba(124, 107, 245, 0.2); animation-delay: -5s; }

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(5%, 5%) scale(1.05); }
  66% { transform: translate(-5%, 2%) scale(0.95); }
}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,10,0.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;transition:all 0.3s ease}
.nav-logo{font-family:'Fira Code',monospace;font-size:15px;color:var(--text);letter-spacing:0.05em;font-weight:600;}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:2.5rem}
.nav-links a{font-size:13px;color:var(--muted);transition:color 0.2s}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{color:var(--accent)}

.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 2rem 4rem;text-align:center;position:relative}
.hero-inner{position:relative;z-index:1;max-width:700px}
.hero-tag{display:inline-block;font-family:'Fira Code',monospace;font-size:12px;color:var(--accent);background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.25);border-radius:30px;padding:6px 18px;margin-bottom:1.5rem;letter-spacing:0.04em}
.hero h1{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:700;line-height:1.1;letter-spacing:-0.03em;margin-bottom:1.2rem}
.hero h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:1.15rem;color:var(--muted);max-width:540px;margin:0 auto 2.5rem;line-height:1.7}
.hero-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn{padding:12px 28px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);border:none;display:inline-flex;align-items:center;gap:10px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(79,142,247,0.3)}
.btn-primary:hover{background:#3a7ae8;transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,142,247,0.4)}
.btn-outline{background:var(--bg3);color:var(--text);border:1px solid var(--border);backdrop-filter:blur(8px)}
.btn-outline:hover{background:rgba(255,255,255,0.05);border-color:var(--border2);transform:translateY(-2px)}
.hero-stats{display:flex;gap:3.5rem;justify-content:center;margin-top:4rem;padding-top:2.5rem;border-top:1px solid var(--border)}
.stat-num{font-size:1.8rem;font-weight:700;color:var(--text)}
.stat-label{font-size:13px;color:var(--dim);margin-top:4px}

section{padding:6rem 2rem;max-width:900px;margin:0 auto}
.section-eyebrow{font-family:'Fira Code',monospace;font-size:12px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.8rem;display:flex;align-items:center;gap:12px}
.section-eyebrow::after{content:'';height:1px;background:var(--border);flex-grow:1;max-width:80px}
.section-title{font-size:2.4rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:0.5rem}
.section-sub{color:var(--muted);font-size:1.05rem;margin-bottom:4rem}

.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
.about-text p{color:var(--muted);line-height:1.8;margin-bottom:1.2rem;font-size:0.98rem}
.about-text p:last-child{margin-bottom:0}
.skills-block{display:flex;flex-direction:column;gap:20px}
.skill-row{display:flex;flex-direction:column;gap:10px}
.skill-label{font-size:12px;color:var(--dim);font-family:'Fira Code',monospace;text-transform:uppercase;letter-spacing:0.05em}
.skill-tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{font-size:12px;padding:6px 14px;border-radius:8px;font-family:'Fira Code',monospace;background:var(--bg3);color:var(--text);border:1px solid var(--border);transition:all 0.2s}

.projects-grid{display:grid;gap:2rem}
.project-card{border-radius:var(--radius);padding:2.5rem;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);cursor:default;position:relative;overflow:hidden;background:var(--bg2);border:1px solid var(--border);backdrop-filter:blur(16px)}
.project-card::before{content:'';position:absolute;inset:0;background:radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.06), transparent 40%);opacity:0;transition:opacity 0.4s;pointer-events:none}
.project-card:hover::before{opacity:1}
.project-card:hover{border-color:var(--border2);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.3)}
.project-card.featured{border-color:rgba(79,142,247,0.2)}
.project-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.2rem;gap:1rem}
.project-name{font-size:1.2rem;font-weight:600;letter-spacing:-0.01em;color:#fff}
.project-badges{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.badge{font-size:11px;padding:4px 12px;border-radius:20px;font-weight:500;display:flex;align-items:center;gap:4px}
.badge-store{background:rgba(61,214,140,0.12);color:var(--green);border:1px solid rgba(61,214,140,0.25)}
.badge-live{background:rgba(79,142,247,0.12);color:var(--accent);border:1px solid rgba(79,142,247,0.25)}
.badge-mern{background:rgba(124,107,245,0.12);color:var(--accent2);border:1px solid rgba(124,107,245,0.25)}
.project-desc{font-size:1rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
.project-highlights{display:flex;flex-direction:column;gap:10px;margin-bottom:2rem}
.highlight-item{font-size:0.9rem;color:#bbb;display:flex;gap:12px;align-items:flex-start}
.highlight-item::before{content:'›';color:var(--accent);font-weight:700;flex-shrink:0;font-size:1rem}
.project-tech{display:flex;flex-wrap:wrap;gap:8px;padding-top:1.5rem;border-top:1px solid var(--border)}
.tech-pill{font-size:12px;padding:4px 12px;border-radius:8px;background:rgba(255,255,255,0.03);color:var(--text);border:1px solid var(--border);font-family:'Fira Code',monospace}

.exp-card{border-radius:var(--radius);padding:2.5rem;position:relative;background:var(--bg2);border:1px solid var(--border);backdrop-filter:blur(16px)}
.exp-card::before{content:'';position:absolute;left:0;top:2.5rem;bottom:2.5rem;width:4px;background:linear-gradient(to bottom,var(--accent),var(--accent2));border-radius:0 4px 4px 0}
.exp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-left:1.5rem;flex-wrap:wrap;gap:1rem}
.exp-company{font-weight:600;font-size:1.15rem;color:#fff}
.exp-date{font-size:12px;color:var(--text);font-family:'Fira Code',monospace;background:var(--bg3);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}
.exp-role{font-size:1rem;color:var(--accent);margin-bottom:1.5rem;padding-left:1.5rem;font-weight:500}
.exp-points{padding-left:1.5rem;display:flex;flex-direction:column;gap:12px}
.exp-point{font-size:0.95rem;color:var(--muted);display:flex;gap:12px;line-height:1.6}
.exp-point::before{content:'—';color:var(--dim);flex-shrink:0}

.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.contact-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem 2rem;display:flex;align-items:center;gap:1.5rem;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);backdrop-filter:blur(16px)}
.contact-card:hover{border-color:var(--border2);transform:translateY(-4px);background:rgba(30,30,30,0.8);box-shadow:0 12px 30px rgba(0,0,0,0.2)}
.contact-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;transition:transform 0.3s}
.contact-card:hover .contact-icon{transform:scale(1.1) rotate(5deg)}
.contact-label{font-size:12px;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;font-family:'Fira Code',monospace}
.contact-value{font-size:15px;font-weight:500;word-break:break-all;color:var(--text)}

footer{border-top:1px solid var(--border);padding:3rem 2rem;text-align:center;color:var(--dim);font-size:13px;font-family:'Fira Code',monospace}

/* Professional Reveal Animations */
.reveal { opacity: 0; transform: translateY(40px); transition: all 0.9s cubic-bezier(0.16,1,0.3,1); }
.reveal.active { opacity: 1; transform: translateY(0); }
.delay-1 { transition-delay: 0.1s; }
.delay-2 { transition-delay: 0.2s; }
.delay-3 { transition-delay: 0.3s; }

@media(max-width:768px){
  .about-grid{grid-template-columns:1fr;gap:3rem}
  .contact-grid{grid-template-columns:1fr}
  .nav-links{gap:1.5rem;display:none} /* Simplistic mobile handling */
  .hero h1{font-size:2.4rem}
  .hero-stats{gap:2rem;flex-wrap:wrap}
  section{padding:4rem 1.5rem}
  .project-card, .exp-card{padding:1.5rem}
  .contact-card{padding:1.5rem}
}
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const NAV_LINKS = ['about','projects','experience','contact'];

// Native Hook for Scroll Animations (Framer Motion alternative)
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('active');
          observer.unobserve(entry.target);
        }
      },
      { threshold: 0.15, rootMargin: '0px 0px -50px 0px' }
    );
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, []);
  return ref;
}

// Native Hook for Mouse Glow Effect on Cards
function useMouseGlow() {
  const handleMouseMove = (e) => {
    const cards = document.querySelectorAll('.project-card');
    for (const card of cards) {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      card.style.setProperty('--mouse-x', `${x}px`);
      card.style.setProperty('--mouse-y', `${y}px`);
    }
  };
  useEffect(() => {
    window.addEventListener('mousemove', handleMouseMove);
    return () => window.removeEventListener('mousemove', handleMouseMove);
  }, []);
}

function App() {
  useMouseGlow();
  const [active, setActive] = useState('');
  
  useEffect(() => {
    const handler = () => {
      const sections = NAV_LINKS.map(id => document.getElementById(id));
      const scrollY = window.scrollY + 100;
      for (let i = sections.length - 1; i >= 0; i--) {
        if (sections[i] && sections[i].offsetTop <= scrollY) { setActive(NAV_LINKS[i]); return; }
      }
      setActive('');
    };
    window.addEventListener('scroll', handler);
    // Trigger entrance animation for hero items immediately
    setTimeout(() => {
      document.querySelectorAll('.hero-reveal').forEach(el => el.classList.add('active'));
    }, 100);
    return () => window.removeEventListener('scroll', handler);
  }, []);

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) {
      const y = el.getBoundingClientRect().top + window.scrollY - 64;
      window.scrollTo({ top: y, behavior: 'smooth' });
    }
  };

  return (
    <>
      <nav>
        <span className="nav-logo">kishore<span>.dev</span></span>
        <div className="nav-links">
          {NAV_LINKS.map(id => (
            <a key={id} href={`#${id}`} className={active === id ? 'active' : ''}
               onClick={e => { e.preventDefault(); scrollTo(id); }}>{id}</a>
          ))}
        </div>
      </nav>
      <Hero scrollTo={scrollTo} />
      <About />
      <Projects />
      <Experience />
      <Contact />
      <footer>built with React & Modern Animations · Kishore R © 2026</footer>
    </>
  );
}

function Hero({ scrollTo }) {

    <div className="hero">
      <div className="hero-inner">
        <div className="hero-tag reveal hero-reveal delay-1">Full-Stack · React Native · MERN</div>
        <h1 className="reveal hero-reveal delay-1">Hi, I'm <span>Kishore R</span></h1>
        <p className="hero-sub reveal hero-reveal delay-2">I build production-grade web apps and mobile experiences — from MERN billing platforms to Play Store–published React Native apps.</p>
        <div className="hero-btns reveal hero-reveal delay-2">
          <a href="#projects" className="btn btn-primary" onClick={e => { e.preventDefault(); scrollTo('projects'); }}>
            <i className="fa fa-folder-open" aria-hidden="true" /> View projects
          </a>
          <a href="mailto:rkishore0333@gmail.com" className="btn btn-outline">
            <i className="fa fa-envelope" aria-hidden="true" /> Get in touch
          </a>
        </div>
        <div className="hero-stats reveal hero-reveal delay-3">

            <div key={l} style={{textAlign:'center'}}>

              <div className="stat-label">{l}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

        <div className="about-text">
          <p>I'm a Full-Stack Developer based in Tamil Nadu, India with a background in Electronics & Communication Engineering. I transitioned into web and mobile development, starting with PHP and MySQL before moving into the React ecosystem.</p>
          <p>I work at Rathna Softnet Technology in Nagercoil, where I build cross-platform mobile apps in React Native and maintain PHP web systems. On the side, I shipped a MERN billing SaaS for a wedding films studio.</p>
          <p>I'm most interested in mobile-first product work — particularly React Native apps that need solid offline support, clean API integration, and real-world production deployment.</p>

            </a>
